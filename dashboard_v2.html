<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STC 수출 적재 대시보드</title>
<style>
:root{
  --navy:#1E2D5A;--navyDk:#131E3E;
  --green:#0F6E56;--greenL:#D1FAE5;
  --red:#B91C1C;  --redL:#FEE2E2;
  --amber:#D97706;--amberL:#FEF3C7;
  --blue:#1D4ED8; --blueL:#EFF6FF;
  --gray:#F4F5F7;--border:#E2E4E9;
  --text:#111827;--muted:#6B7280;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--gray);color:var(--text);}

.header{background:var(--navy);color:#fff;padding:13px 24px;display:flex;align-items:center;justify-content:space-between;}
.h-title{font-size:17px;font-weight:700;}
.h-sub{font-size:11px;color:#93a4c9;margin-top:2px;}
.h-right{display:flex;align-items:center;gap:12px;}
.clock{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums;}

/* 컨테이너 선택 바 */
.cont-bar{background:#fff;border-bottom:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.cont-label{font-size:12px;font-weight:600;color:var(--muted);white-space:nowrap;}
.cont-sel{padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-weight:700;color:var(--navy);background:#fff;cursor:pointer;}
.cont-sel:focus{outline:none;border-color:var(--navy);}
.date-input{padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;background:#fff;}
.refresh-btn{padding:8px 16px;border-radius:8px;background:var(--navy);color:#fff;border:none;font-size:12px;font-weight:600;cursor:pointer;}
.refresh-btn:hover{background:var(--navyDk);}
.auto-badge{font-size:11px;color:var(--green);font-weight:600;}

/* 알람 배너 */
.alarm-bar{display:none;background:var(--redL);border-bottom:2px solid #FCA5A5;padding:9px 24px;font-size:13px;font-weight:600;color:var(--red);align-items:center;gap:10px;}
.alarm-bar.show{display:flex;}
.alarm-dot{width:10px;height:10px;border-radius:50%;background:var(--red);animation:blink 1s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.main{padding:16px 24px;max-width:1400px;}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px;}
.kpi{background:#fff;border-radius:10px;border:1px solid var(--border);padding:13px 14px;}
.kpi-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
.kpi-v{font-size:26px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums;}
.kpi-s{font-size:10px;color:var(--muted);margin-top:3px;}
.c-navy{color:var(--navy);}.c-green{color:var(--green);}.c-red{color:var(--red);}.c-amber{color:var(--amber);}

/* 전체 진행 바 */
.total-prog{background:#fff;border-radius:10px;border:1px solid var(--border);padding:14px;margin-bottom:14px;}
.tp-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.tp-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.tp-pct{font-size:20px;font-weight:700;color:var(--navy);}
.prog-bg{height:16px;background:#E5E7EB;border-radius:8px;overflow:hidden;}
.prog-fill{height:100%;border-radius:8px;transition:width .8s ease;background:var(--green);}

/* 그리드 */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.card{background:#fff;border-radius:10px;border:1px solid var(--border);padding:14px;}
.card-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;}

/* 품목 테이블 */
.tbl-wrap{overflow-y:auto;max-height:400px;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{position:sticky;top:0;background:var(--gray);font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;padding:6px 8px;border-bottom:1px solid var(--border);text-align:left;}
td{padding:8px;border-bottom:1px solid #F3F4F6;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr.done-row{background:#F0FDF9;}
tr.prog-row{background:#EFF6FF;}

/* 수량 진행 바 (테이블 내) */
.tbl-prog{display:flex;align-items:center;gap:6px;}
.tbl-bar-bg{flex:1;height:8px;background:#E5E7EB;border-radius:4px;overflow:hidden;}
.tbl-bar-fill{height:100%;border-radius:4px;transition:width .5s;}
.tbl-qty{font-size:11px;font-weight:700;white-space:nowrap;min-width:40px;text-align:right;}

/* 박스 아이콘 */
.boxes-wrap{display:flex;gap:3px;flex-wrap:wrap;}
.box-icon{width:14px;height:14px;border-radius:3px;border:1.5px solid #E5E7EB;background:#F9FAFB;}
.box-icon.filled{background:var(--green);border-color:var(--green);}

/* 상태 필 */
.pill{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap;}
.pill-done{background:var(--greenL);color:var(--green);}
.pill-prog{background:var(--blueL);color:var(--blue);}
.pill-miss{background:var(--redL);color:var(--red);}

/* 로그 */
.log-list{list-style:none;max-height:280px;overflow-y:auto;}
.log-item{display:flex;gap:8px;padding:7px 0;border-bottom:1px solid #F3F4F6;font-size:12px;}
.log-item:last-child{border-bottom:none;}
.ldot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.ldot-ok{background:var(--green);}.ldot-prog{background:var(--blue);}
.ldot-warn{background:#F59E0B;}.ldot-err{background:var(--red);}
.ltime{color:var(--muted);min-width:46px;font-variant-numeric:tabular-nums;}
.lmsg{color:var(--text);}

/* 봉인 */
.seal-btn{width:100%;margin-top:12px;padding:13px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;border:2px solid;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;}
.seal-locked{background:var(--redL);border-color:#FCA5A5;color:var(--red);cursor:not-allowed;}
.seal-ready{background:var(--navy);border-color:var(--navy);color:#fff;}
.seal-ready:hover{background:var(--navyDk);}

/* 완료 배너 */
.done-banner{display:none;background:var(--greenL);border:2px solid #6EE7B7;border-radius:10px;padding:16px;text-align:center;margin-bottom:14px;}
.done-banner.show{display:block;}
.done-banner-title{font-size:18px;font-weight:700;color:var(--green);margin-bottom:4px;}
.done-banner-sub{font-size:12px;color:var(--green);}

@media(max-width:900px){.kpi-row{grid-template-columns:repeat(3,1fr);}.grid-2{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="h-title">📦 수출 적재 대시보드</div>
    <div class="h-sub">STC Co., Ltd. &nbsp;|&nbsp; 태국 → 인도·한국 수출</div>
  </div>
  <div class="h-right">
    <div style="text-align:right">
      <div class="clock" id="clock">--:--:--</div>
      <div style="font-size:11px;color:#93a4c9" id="datedisp"></div>
    </div>
  </div>
</div>

<!-- 컨테이너 선택 -->
<div class="cont-bar">
  <span class="cont-label">컨테이너:</span>
  <select class="cont-sel" id="cont-sel" onchange="loadStatus()">
    <option value="">선택하세요</option>
  </select>
  <input class="date-input" type="date" id="date-sel" onchange="loadContainers()">
  <button class="refresh-btn" onclick="loadAll()">🔄 새로고침</button>
  <span class="auto-badge" id="auto-badge">● 30초 자동 갱신</span>
</div>

<!-- 알람 배너 -->
<div class="alarm-bar" id="alarm-bar">
  <span class="alarm-dot"></span>
  <strong>⚠ 미완료 품목 있음 —</strong>
  <span id="alarm-text"></span>
  <span style="margin-left:auto;font-size:11px" id="alarm-time"></span>
</div>

<div class="main">

<!-- 완료 배너 -->
<div class="done-banner" id="done-banner">
  <div class="done-banner-title">🎉 전체 적재 완료!</div>
  <div class="done-banner-sub" id="done-banner-sub"></div>
</div>

<!-- KPI -->
<div class="kpi-row">
  <div class="kpi">
    <div class="kpi-l">총 품목</div>
    <div class="kpi-v c-navy" id="k-total">—</div>
    <div class="kpi-s">종류</div>
  </div>
  <div class="kpi">
    <div class="kpi-l">완료</div>
    <div class="kpi-v c-green" id="k-done">—</div>
    <div class="kpi-s" id="k-done-s">품목</div>
  </div>
  <div class="kpi">
    <div class="kpi-l">미완료</div>
    <div class="kpi-v c-red" id="k-miss">—</div>
    <div class="kpi-s">품목</div>
  </div>
  <div class="kpi">
    <div class="kpi-l">총 스캔</div>
    <div class="kpi-v c-amber" id="k-scanned">—</div>
    <div class="kpi-s" id="k-scanned-s">/ — 박스</div>
  </div>
  <div class="kpi">
    <div class="kpi-l">완료율</div>
    <div class="kpi-v c-navy" id="k-pct">—</div>
    <div class="kpi-s">%</div>
  </div>
</div>

<!-- 전체 진행 바 -->
<div class="total-prog">
  <div class="tp-header">
    <span class="tp-title">전체 박스 진행률</span>
    <span class="tp-pct" id="tp-pct">0%</span>
  </div>
  <div class="prog-bg"><div class="prog-fill" id="tp-bar" style="width:0%"></div></div>
</div>

<!-- 품목 테이블 + 로그 -->
<div class="grid-2">
  <div class="card">
    <div class="card-title">📦 품목별 수량 현황</div>
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th>고객</th><th>품명</th><th>PART CODE</th>
            <th>박스 진행</th><th>박스</th><th>상태</th><th>최근 스캔</th>
          </tr>
        </thead>
        <tbody id="items-tbody">
          <tr><td colspan="7" style="text-align:center;color:var(--muted);padding:20px">
            컨테이너를 선택하세요
          </td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div>
    <!-- 봉인 & 로그 -->
    <div class="card" style="margin-bottom:14px">
      <div class="card-title">🚢 봉인 & 완료</div>
      <div style="font-size:12px;color:var(--muted);line-height:1.8" id="seal-info">
        컨테이너를 선택하면 봉인 상태를 확인할 수 있습니다
      </div>
      <button class="seal-btn seal-locked" id="seal-btn" onclick="trySeal()">
        🔒 봉인 잠금
      </button>
    </div>

    <div class="card">
      <div class="card-title">🕐 스캔 이력</div>
      <ul class="log-list" id="log-list">
        <li class="log-item"><div class="ldot ldot-warn"></div>
        <span class="lmsg">컨테이너 선택 후 이력이 표시됩니다</span></li>
      </ul>
    </div>
  </div>
</div>

</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwPYQIw8-arUz09lNu7pGvsnMd43wortuCxUZefWd3LWdk4Pv2dymOroiHc6AxJT7MvRA/exec";

let CURRENT_CONTAINER = '';
let STATUS_DATA = null;
let autoTimer   = null;

// ── 초기화 ───────────────────────────────────
window.onload = () => {
  const today = new Date().toISOString().slice(0,10);
  document.getElementById('date-sel').value = today;
  startClock();
  loadContainers();
  autoTimer = setInterval(loadStatus, 30000);
};

// ── 시계 ────────────────────────────────────
function startClock() {
  const tick = () => {
    const now = new Date();
    document.getElementById('clock').textContent = now.toLocaleTimeString('ko-KR',{hour12:false});
    document.getElementById('datedisp').textContent = now.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
  };
  tick(); setInterval(tick,1000);
}

// ── 컨테이너 목록 ────────────────────────────
async function loadContainers() {
  const date = document.getElementById('date-sel').value;
  try {
    const res  = await fetch(`${SCRIPT_URL}?action=getContainers&date=${date}`);
    const data = await res.json();
    if (data.status === 'ok') renderContainers(data.containers);
  } catch(e) {
    renderContainers(['CN-2026-0627-A','CN-2026-0627-B']);
  }
}

function renderContainers(list) {
  const sel = document.getElementById('cont-sel');
  const cur = sel.value;
  sel.innerHTML = '<option value="">선택하세요</option>' +
    list.map(c=>`<option value="${c}" ${c===cur?'selected':''}>${c}</option>`).join('');
  if (cur && list.includes(cur)) loadStatus();
}

// ── 현황 로드 ────────────────────────────────
async function loadStatus() {
  CURRENT_CONTAINER = document.getElementById('cont-sel').value;
  if (!CURRENT_CONTAINER) return;
  const date = document.getElementById('date-sel').value;

  try {
    const res  = await fetch(`${SCRIPT_URL}?action=getStatus&containerNo=${encodeURIComponent(CURRENT_CONTAINER)}&date=${date}`);
    const data = await res.json();
    if (data.status === 'ok') {
      STATUS_DATA = data.data;
      renderDashboard();
    }
  } catch(e) {
    STATUS_DATA = getSampleStatus();
    renderDashboard();
  }
}

function loadAll() { loadContainers(); loadStatus(); }

function getSampleStatus() {
  return {
    containerNo:'CN-SAMPLE', date: new Date().toISOString().slice(0,10),
    plan:[
      {qrKey:'SHINANN_F543QVAQA03',partName:'MANIFOLD-COMP QA-QA',partCode:'F543QVAQA03',customer:'SHINANN',planQty:3,scanned:3,isDone:true,lastScan:'2026-06-27 09:12:00',lastBy:'Kim'},
      {qrKey:'SHINANN_F510-CD1AA', partName:'CYLINDER HS-15 F',    partCode:'F510-CD1AA', customer:'SHINANN',planQty:5,scanned:2,isDone:false,lastScan:'2026-06-27 09:20:00',lastBy:'Lee'},
      {qrKey:'SADC_F543-QB7CB',    partName:'MANIFOLD ASSY-SUC',   partCode:'F543-QB7CB', customer:'SADC',   planQty:2,scanned:0,isDone:false,lastScan:null,lastBy:null},
    ],
    summary:{totalItems:3,doneItems:1,totalPlan:10,totalScanned:5},
  };
}

// ── 대시보드 렌더 ────────────────────────────
function renderDashboard() {
  if (!STATUS_DATA) return;
  const { plan, summary } = STATUS_DATA;
  const { totalItems,doneItems,totalPlan,totalScanned } = summary;
  const missItems = totalItems - doneItems;
  const pct = totalPlan ? Math.round(totalScanned/totalPlan*100) : 0;

  // KPI
  document.getElementById('k-total').textContent   = totalItems;
  document.getElementById('k-done').textContent    = doneItems;
  document.getElementById('k-miss').textContent    = missItems;
  document.getElementById('k-scanned').textContent = totalScanned;
  document.getElementById('k-scanned-s').textContent = `/ ${totalPlan} 박스`;
  document.getElementById('k-pct').textContent     = pct;
  document.getElementById('tp-pct').textContent    = `${pct}%`;
  document.getElementById('tp-bar').style.width    = `${pct}%`;

  // 완료 배너 / 알람
  const doneBanner = document.getElementById('done-banner');
  const alarmBar   = document.getElementById('alarm-bar');
  if (missItems === 0 && totalItems > 0) {
    doneBanner.classList.add('show');
    document.getElementById('done-banner-sub').textContent =
      `컨테이너 ${CURRENT_CONTAINER} — ${totalItems}품목 ${totalPlan}박스 전체 완료`;
    alarmBar.classList.remove('show');
    renderSeal(true, 0);
  } else {
    doneBanner.classList.remove('show');
    if (missItems > 0) {
      alarmBar.classList.add('show');
      const missed = plan.filter(p=>!p.isDone);
      document.getElementById('alarm-text').textContent =
        missed.slice(0,2).map(p=>p.partCode).join(' / ') + (missed.length>2?` 외 ${missed.length-2}건`:'');
      document.getElementById('alarm-time').textContent = new Date().toLocaleTimeString('ko-KR',{hour12:false});
    }
    renderSeal(false, missItems);
  }

  // 품목 테이블
  renderTable(plan);

  // 로그 (스캔 완료 품목 최근순)
  renderLog(plan);
}

function renderTable(plan) {
  const tbody = document.getElementById('items-tbody');
  tbody.innerHTML = plan.map(p => {
    const pct      = p.planQty ? Math.round(p.scanned/p.planQty*100) : 0;
    const rowClass = p.isDone ? 'done-row' : p.scanned>0 ? 'prog-row' : '';
    const isShin   = p.customer==='SHINANN';
    const custStyle= isShin
      ? 'color:var(--blue);font-weight:700;font-size:10px'
      : 'color:var(--amber);font-weight:700;font-size:10px';
    const barColor = p.isDone ? 'background:var(--green)' : 'background:var(--blue)';
    const qtyColor = p.isDone?'color:var(--green)':p.scanned>0?'color:var(--blue)':'color:var(--red)';
    const statusHtml= p.isDone
      ? '<span class="pill pill-done">✅ 완료</span>'
      : p.scanned>0
        ? '<span class="pill pill-prog">진행중</span>'
        : '<span class="pill pill-miss">❌ 미스캔</span>';

    // 박스 아이콘 (최대 8개)
    const max = Math.min(p.planQty, 8);
    const boxes = Array.from({length:max},(_,i)=>
      `<div class="box-icon ${i<p.scanned?'filled':''}"></div>`).join('');

    const scanTime = p.lastScan ? p.lastScan.slice(11,16) : '-';

    return `<tr class="${rowClass}">
      <td><span style="${custStyle}">${p.customer}</span></td>
      <td style="font-size:11px;max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.partName}</td>
      <td style="font-family:monospace;font-size:10px;color:var(--navy)">${p.partCode}</td>
      <td style="min-width:120px">
        <div class="tbl-prog">
          <div class="tbl-bar-bg"><div class="tbl-bar-fill" style="width:${pct}%;${barColor}"></div></div>
          <span class="tbl-qty" style="${qtyColor}">${p.scanned}/${p.planQty}</span>
        </div>
        <div class="boxes-wrap" style="margin-top:3px">${boxes}</div>
      </td>
      <td style="text-align:center;font-size:11px;color:var(--muted)">${p.planQty}박스</td>
      <td>${statusHtml}</td>
      <td style="font-size:10px;color:var(--muted)">${scanTime}${p.lastBy?`<br>${p.lastBy}`:''}</td>
    </tr>`;
  }).join('');
}

function renderLog(plan) {
  const ul = document.getElementById('log-list');
  const scanned = plan.filter(p=>p.lastScan).sort((a,b)=>b.lastScan>a.lastScan?1:-1);
  if (scanned.length===0) {
    ul.innerHTML = '<li class="log-item"><div class="ldot ldot-warn"></div><span class="lmsg">아직 스캔 이력 없음</span></li>';
    return;
  }
  ul.innerHTML = scanned.map(p=>{
    const time = p.lastScan ? p.lastScan.slice(11,16) : '--:--';
    const dot  = p.isDone ? 'ldot-ok' : 'ldot-prog';
    return `<li class="log-item">
      <div class="ldot ${dot}"></div>
      <span class="ltime">${time}</span>
      <span class="lmsg">${p.partName} &nbsp;
        <b style="color:var(--navy)">${p.scanned}/${p.planQty}박스</b>
        ${p.isDone?'<span style="color:var(--green)"> ✅완료</span>':''}
        ${p.lastBy?`<span style="color:var(--muted);font-size:10px"> · ${p.lastBy}</span>`:''}
      </span>
    </li>`;
  }).join('');
}

function renderSeal(ready, missCount) {
  const btn  = document.getElementById('seal-btn');
  const info = document.getElementById('seal-info');
  if (ready) {
    btn.className = 'seal-btn seal-ready';
    btn.innerHTML = '✅ 봉인 승인';
    info.textContent = '모든 품목 스캔 완료. 봉인 후 선적을 진행하세요.';
  } else {
    btn.className = 'seal-btn seal-locked';
    btn.innerHTML = `🔒 봉인 잠금 — ${missCount}품목 미완료`;
    info.textContent = `미완료 품목 ${missCount}건 해소 후 봉인 가능합니다.`;
  }
}

function trySeal() {
  if (!STATUS_DATA) return;
  const { summary } = STATUS_DATA;
  const missItems = summary.totalItems - summary.doneItems;
  if (missItems > 0) {
    alert(`⚠ 봉인 불가\n\n미완료 품목 ${missItems}건이 남아 있습니다.`);
  } else {
    if (confirm(`컨테이너 ${CURRENT_CONTAINER}\n전체 완료 확인. 봉인하시겠습니까?`)) {
      alert('✅ 봉인 완료. 선적을 진행하세요.');
    }
  }
}
</script>
