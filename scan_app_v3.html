<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>STC 적재 스캔</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f5f7; color: #111827; min-height: 100vh; }

/* ── 시작 화면 ── */
#start {
  max-width: 400px; margin: 0 auto;
  padding: 40px 20px;
}
.logo { text-align: center; font-size: 48px; margin-bottom: 8px; }
.app-title { text-align: center; font-size: 20px; font-weight: 700; color: #1E2D5A; margin-bottom: 4px; }
.app-sub { text-align: center; font-size: 12px; color: #6B7280; margin-bottom: 32px; }

.field { margin-bottom: 14px; }
.field label { display: block; font-size: 11px; font-weight: 600; color: #6B7280; margin-bottom: 5px; text-transform: uppercase; letter-spacing: .4px; }
.field input { width: 100%; padding: 13px 14px; border: 1.5px solid #E2E4E9; border-radius: 10px; font-size: 15px; background: #fff; }
.field input:focus { outline: none; border-color: #1E2D5A; }

.start-btn { width: 100%; padding: 15px; border-radius: 12px; background: #1E2D5A; color: #fff; font-size: 16px; font-weight: 700; border: none; cursor: pointer; margin-top: 8px; }
.start-btn:disabled { background: #9CA3AF; cursor: not-allowed; }
.start-btn:active:not(:disabled) { background: #131E3E; }

/* ── 메인 화면 ── */
#main { display: none; }

.topbar { background: #1E2D5A; color: #fff; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
.tb-left .tb-title { font-size: 14px; font-weight: 700; }
.tb-left .tb-sub { font-size: 10px; color: #93a4c9; margin-top: 2px; }
.tb-clock { font-size: 16px; font-weight: 700; font-variant-numeric: tabular-nums; }

/* KPI */
.kpi-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: #E2E4E9; }
.kpi-box { background: #fff; padding: 10px 6px; text-align: center; }
.kpi-val { font-size: 22px; font-weight: 700; }
.kpi-lbl { font-size: 10px; color: #6B7280; margin-top: 1px; }
.c-navy { color: #1E2D5A; }
.c-green { color: #0F6E56; }
.c-red { color: #B91C1C; }

/* 카메라 */
.cam-wrap { padding: 12px 14px; }
.sec-lbl { font-size: 10px; font-weight: 600; color: #6B7280; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
#qr-reader { width: 100%; border-radius: 12px; overflow: hidden; border: 2px solid #1E2D5A; background: #000; }

/* 결과 카드 */
.result { display: none; margin: 10px 14px 0; border-radius: 12px; padding: 14px; border: 2px solid; }
.result.ok   { background: #fff; border-color: #0F6E56; }
.result.err  { background: #FEE2E2; border-color: #FCA5A5; }
.result.over { background: #FEE2E2; border-color: #FCA5A5; }
.result.dup  { background: #FEF3C7; border-color: #FCD34D; }

.r-name { font-size: 15px; font-weight: 700; color: #1E2D5A; margin-bottom: 3px; }
.r-code { font-size: 11px; font-family: monospace; color: #6B7280; margin-bottom: 10px; }
.r-msg  { font-size: 13px; font-weight: 600; }
.r-msg.ok-txt   { color: #0F6E56; }
.r-msg.err-txt  { color: #B91C1C; }
.r-msg.warn-txt { color: #92400E; }

/* 진행 바 */
.prog-wrap { margin: 8px 0; }
.prog-nums { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; }
.prog-scanned { font-size: 24px; font-weight: 700; color: #1E2D5A; }
.prog-total { font-size: 12px; color: #6B7280; align-self: flex-end; margin-bottom: 3px; }
.prog-bg { height: 12px; background: #E5E7EB; border-radius: 6px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 6px; transition: width .4s; }
.fill-prog { background: #1D4ED8; }
.fill-done { background: #0F6E56; }

/* 박스 아이콘 */
.boxes { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 8px; }
.box { width: 20px; height: 20px; border-radius: 4px; border: 2px solid #E5E7EB; background: #F9FAFB; }
.box.on { background: #0F6E56; border-color: #0F6E56; }

/* 수량 입력 */
.qty-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
.qty-lbl { font-size: 12px; color: #6B7280; }
.qty-ctrl { display: flex; align-items: center; gap: 6px; }
.qty-btn { width: 28px; height: 28px; border-radius: 6px; border: 1px solid #E2E4E9; background: #F4F5F7; font-size: 16px; font-weight: 700; cursor: pointer; }
.qty-val { font-size: 16px; font-weight: 700; color: #1E2D5A; min-width: 28px; text-align: center; }

/* 저장 버튼 */
.save-btn { width: calc(100% - 28px); margin: 10px 14px 0; padding: 13px; border-radius: 10px; background: #0F6E56; color: #fff; font-size: 14px; font-weight: 700; border: none; cursor: pointer; display: none; }
.save-btn:active { background: #065F46; }
.save-btn:disabled { background: #9CA3AF; cursor: not-allowed; }

/* 품목 리스트 */
.list-wrap { padding: 10px 14px 80px; }
.list-items { list-style: none; }
.li { background: #fff; border-radius: 10px; border: 1px solid #E2E4E9; padding: 10px 12px; margin-bottom: 6px; display: flex; align-items: center; gap: 10px; }
.li.done { border-color: #6EE7B7; background: #F0FDF9; }
.li.prog { border-color: #93C5FD; background: #EFF6FF; }
.li-info { flex: 1; min-width: 0; }
.li-name { font-size: 12px; font-weight: 700; color: #1E2D5A; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.li-code { font-size: 10px; font-family: monospace; color: #6B7280; }
.li-right { text-align: right; flex-shrink: 0; }
.li-qty { font-size: 14px; font-weight: 700; }
.li-status { font-size: 10px; font-weight: 600; }
.mini-bar { height: 4px; background: #E5E7EB; border-radius: 2px; overflow: hidden; margin-top: 4px; min-width: 60px; }
.mini-fill { height: 100%; border-radius: 2px; background: #0F6E56; }

/* 로딩 */
.loading { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 100; align-items: center; justify-content: center; flex-direction: column; gap: 10px; }
.loading.show { display: flex; }
.spinner { width: 36px; height: 36px; border: 4px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-txt { color: #fff; font-size: 13px; font-weight: 600; }
</style>
</head>
<body>

<!-- ── 시작 화면 ── -->
<div id="start">
  <div class="logo">📦</div>
  <div class="app-title">STC 적재 스캔</div>
  <div class="app-sub">수출 적재 QR 확인 시스템</div>

  <div class="field">
    <label>컨테이너 번호 *</label>
    <input id="s-cont" placeholder="예) CN-2026-0627-A" oninput="chkStart()">
  </div>
  <div class="field">
    <label>작업자 이름 *</label>
    <input id="s-worker" placeholder="이름" oninput="chkStart()">
  </div>
  <button class="start-btn" id="start-btn" disabled onclick="goMain()">📷 스캔 시작</button>
</div>

<!-- ── 메인 화면 ── -->
<div id="main">
  <div class="topbar">
    <div class="tb-left">
      <div class="tb-title" id="t-cont">—</div>
      <div class="tb-sub" id="t-worker">작업자: —</div>
    </div>
    <div class="tb-clock" id="clock"></div>
  </div>

  <div class="kpi-row">
    <div class="kpi-box"><div class="kpi-val c-navy" id="k-total">0</div><div class="kpi-lbl">계획</div></div>
    <div class="kpi-box"><div class="kpi-val c-green" id="k-done">0</div><div class="kpi-lbl">완료</div></div>
    <div class="kpi-box"><div class="kpi-val c-red" id="k-miss">0</div><div class="kpi-lbl">미완료</div></div>
  </div>

  <div class="cam-wrap">
    <div class="sec-lbl">📷 QR 스캔</div>
    <div id="qr-reader"></div>
  </div>

  <!-- 결과 카드 -->
  <div class="result" id="result"></div>

  <!-- 수량 입력 -->
  <div class="qty-row" id="qty-row" style="display:none; padding: 0 14px;">
    <span class="qty-lbl">박스 수량</span>
    <div class="qty-ctrl">
      <button class="qty-btn" onclick="chgQty(-1)">−</button>
      <span class="qty-val" id="qty-val">1</span>
      <button class="qty-btn" onclick="chgQty(1)">+</button>
    </div>
  </div>

  <!-- 저장 버튼 -->
  <button class="save-btn" id="save-btn" onclick="doSave()">✅ 저장</button>

  <!-- 품목 리스트 -->
  <div class="list-wrap">
    <div class="sec-lbl" style="margin-bottom:8px">품목 현황</div>
    <ul class="list-items" id="item-list"></ul>
  </div>
</div>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-txt" id="loading-txt">처리 중...</div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbyR0d7Xx84bsyeP3yvFmSy5fMyED_Oey6E0EGmwP7zKOuL81QXx96E4jH__dPuD7HVqGA/exec";

let CFG     = { cont:'', worker:'', date:'' };
let PLAN    = [];   // 오늘 계획 [{ qrKey, partName, partCode, customer, planQty, scanned }]
let pending = null; // 스캔됐지만 아직 저장 안된 항목
let scannedBoxes = new Set(); // 이미 스캔한 BOX ID 세트 (중복 차단)
let curQty  = 1;
let scanner = null;
let lastQR  = ''; let lastT = 0;

// ── 시작 ────────────────────────────────────
function chkStart() {
  const c = document.getElementById('s-cont').value.trim();
  const w = document.getElementById('s-worker').value.trim();
  document.getElementById('start-btn').disabled = !(c && w);
}

async function goMain() {
  CFG.cont   = document.getElementById('s-cont').value.trim();
  CFG.worker = document.getElementById('s-worker').value.trim();
  CFG.date   = new Date().toISOString().slice(0,10);

  document.getElementById('start').style.display = 'none';
  document.getElementById('main').style.display  = 'block';
  document.getElementById('t-cont').textContent   = CFG.cont;
  document.getElementById('t-worker').textContent = '작업자: ' + CFG.worker;

  startClock();
  await loadPlan();
  initCam();
}

// ── 시계 ────────────────────────────────────
function startClock() {
  const el = document.getElementById('clock');
  const tick = () => el.textContent = new Date().toLocaleTimeString('ko-KR',{hour12:false});
  tick(); setInterval(tick, 1000);
}

// ── 계획 로드 ────────────────────────────────
async function loadPlan() {
  showLoad('계획 로딩 중...');
  try {
    const res  = await fetch(`${URL}?action=getPlan&containerNo=${encodeURIComponent(CFG.cont)}&date=${CFG.date}`);
    const data = await res.json();
    if (data.status === 'ok' && data.plan.length > 0) {
      PLAN = data.plan.map(p => ({ ...p, scanned: 0 }));
      // 스캔 현황도 로드
      await loadScanLog();
    } else {
      PLAN = [];
    }
  } catch(e) {
    PLAN = [];
  }
  hideLoad();
  renderList();
}

async function loadScanLog() {
  try {
    const res  = await fetch(`${URL}?action=getScanLog&containerNo=${encodeURIComponent(CFG.cont)}&date=${CFG.date}`);
    const data = await res.json();
    if (data.status === 'ok') {
      // 스캔 수량 집계
      data.logs.forEach(log => {
        const item = PLAN.find(p => p.qrKey === log.qrKey);
        if (item) item.scanned += (Number(log.qty) || 0);
      });
    }
  } catch(e) {}
}

// ── 카메라 ───────────────────────────────────
function initCam() {
  scanner = new Html5Qrcode("qr-reader");
  scanner.start(
    { facingMode: "environment" },
    { fps: 12, qrbox: { width: 220, height: 220 } },
    onScan,
    () => {}
  ).catch(() => {
    document.getElementById('qr-reader').innerHTML =
      '<div style="padding:24px;text-align:center;color:#fff;font-size:13px">카메라 접근 불가<br>아래 리스트에서 터치하여 스캔</div>';
  });
}

function onScan(text) {
  const now = Date.now();
  if (text === lastQR && now - lastT < 2500) return;
  lastQR = text; lastT = now;
  processScan(text);
}

// ── 스캔 처리 ────────────────────────────────
// QR 형식: QR_KEY|수량|BOX001 또는 기존 QR_KEY
function processScan(rawQR) {
  const card = document.getElementById('result');
  card.style.display = 'block';

  // QR 파싱
  const parts  = rawQR.split('|');
  const qrKey  = parts[0];
  const qty    = parts.length >= 2 ? parseInt(parts[1]) || 1 : 1;
  const boxId  = parts.length >= 3 ? parts[2] : null;

  // 중복 스캔 차단 (BOX ID 기준)
  if (boxId && scannedBoxes.has(rawQR)) {
    card.className = 'result dup';
    card.innerHTML = `
      <div class="r-name">⚠ 중복 스캔!</div>
      <div class="r-code">${boxId}</div>
      <div class="r-msg warn-txt">이미 스캔된 박스입니다</div>`;
    document.getElementById('qty-row').style.display  = 'none';
    document.getElementById('save-btn').style.display = 'none';
    pending = null;
    vibrate([100]);
    return;
  }

  const item = PLAN.find(p => p.qrKey === qrKey);

  // 계획에 없는 품목
  if (!item && PLAN.length > 0) {
    card.className = 'result err';
    card.innerHTML = `
      <div class="r-name">⚠ 오적재 감지!</div>
      <div class="r-code">${qrKey}</div>
      <div class="r-msg err-txt">이 컨테이너 계획에 없는 품목입니다</div>`;
    document.getElementById('qty-row').style.display  = 'none';
    document.getElementById('save-btn').style.display = 'none';
    pending = null;
    vibrate([200,100,200]);
    return;
  }

  // 정상 스캔
  pending = { ...(item || { qrKey, partCode:qrKey, partName:qrKey, customer:'', planQty:null, scanned:0 }), rawQR, boxId };
  curQty  = qty; // QR에서 수량 자동 설정
  document.getElementById('qty-val').textContent = curQty;
  renderScanCard(pending, curQty);
  document.getElementById('qty-row').style.display  = 'flex';
  document.getElementById('save-btn').style.display = 'block';
  document.getElementById('save-btn').disabled      = false;
  vibrate([50]);
}

function renderScanCard(item, qty) {
  const card    = document.getElementById('result');
  const scanned = item.scanned + qty;
  const plan    = item.planQty || 0;
  const pct     = plan ? Math.min(100, Math.round(scanned/plan*100)) : 0;
  const isDone  = plan && scanned >= plan;
  const maxBox  = Math.min(plan || qty, 10);
  const boxes   = Array.from({length: maxBox}, (_, i) =>
    `<div class="box ${i < Math.min(scanned, maxBox) ? 'on' : ''}"></div>`
  ).join('');

  card.className = 'result ok';
  card.innerHTML = `
    <div class="r-name">${item.partName}</div>
    <div class="r-code">${item.partCode} &nbsp;|&nbsp; ${item.customer}</div>
    <div class="prog-wrap">
      <div class="prog-nums">
        <span class="prog-scanned">${scanned}</span>
        <span class="prog-total">/ ${plan || '?'} 박스</span>
      </div>
      <div class="prog-bg">
        <div class="prog-fill ${isDone ? 'fill-done' : 'fill-prog'}" style="width:${pct}%"></div>
      </div>
      <div class="boxes">${boxes}</div>
    </div>
    ${isDone ? '<div class="r-msg ok-txt" style="text-align:center;font-size:16px;margin-top:6px">✅ 완료!</div>' :
      `<div class="r-msg" style="color:#6B7280;text-align:center">남은 수량: ${plan - scanned}박스</div>`}`;
}

// ── 수량 조절 ────────────────────────────────
function chgQty(d) {
  curQty = Math.max(1, curQty + d);
  document.getElementById('qty-val').textContent = curQty;
  if (pending) renderScanCard(pending, curQty);
}

// ── 저장 ────────────────────────────────────
async function doSave() {
  if (!pending) return;
  document.getElementById('save-btn').disabled = true;
  showLoad('저장 중...');

  try {
    const res  = await fetch(URL, {
      method : 'POST',
      body   : JSON.stringify({
        action      : 'scan',
        qrKey       : pending.qrKey,
        containerNo : CFG.cont,
        qty         : curQty,
        scanBy      : CFG.worker,
      }),
    });
    const data = await res.json();
    hideLoad();

    if (data.status === 'ok') {
      if (pending.rawQR) scannedBoxes.add(pending.rawQR);
      pending.scanned += curQty;
      pending.isDone   = data.isDone;
      renderList();
      document.getElementById('qty-row').style.display  = 'none';
      document.getElementById('save-btn').style.display = 'none';
      vibrate(data.isDone ? [50,50,100,50,100] : [50]);
      pending = null;
    } else if (data.code === 'OVER_QTY') {
      alert(`초과!\n${data.msg}`);
      document.getElementById('save-btn').disabled = false;
    } else {
      alert(`오류: ${data.msg}`);
      document.getElementById('save-btn').disabled = false;
    }
  } catch(e) {
    hideLoad();
    // 오프라인 — 로컬만 반영
    if (pending.rawQR) scannedBoxes.add(pending.rawQR);
    pending.scanned += curQty;
    renderList();
    document.getElementById('qty-row').style.display  = 'none';
    document.getElementById('save-btn').style.display = 'none';
    pending = null;
  }
}

// ── 리스트 렌더 ──────────────────────────────
function renderList() {
  const total = PLAN.length;
  const done  = PLAN.filter(p => p.planQty && p.scanned >= p.planQty).length;
  document.getElementById('k-total').textContent = total;
  document.getElementById('k-done').textContent  = done;
  document.getElementById('k-miss').textContent  = total - done;

  const ul = document.getElementById('item-list');
  if (PLAN.length === 0) {
    ul.innerHTML = '<li style="text-align:center;color:#6B7280;font-size:12px;padding:20px">계획 데이터 없음<br>2.PLAN 시트에 데이터를 입력하세요</li>';
    return;
  }

  ul.innerHTML = PLAN.map(p => {
    const plan    = p.planQty || 0;
    const scanned = p.scanned || 0;
    const isDone  = plan && scanned >= plan;
    const isIn    = scanned > 0 && !isDone;
    const pct     = plan ? Math.min(100, Math.round(scanned/plan*100)) : 0;
    const qtyColor= isDone ? 'color:#0F6E56' : isIn ? 'color:#1D4ED8' : 'color:#B91C1C';
    const status  = isDone ? '✅ 완료' : isIn ? `${scanned}/${plan}` : '미스캔';
    const stColor = isDone ? 'color:#0F6E56' : isIn ? 'color:#1D4ED8' : 'color:#B91C1C';
    return `
    <li class="li ${isDone?'done':isIn?'prog':''}" onclick="processScan('${p.qrKey}')">
      <div class="li-info">
        <div class="li-name">${p.partName}</div>
        <div class="li-code">${p.partCode}</div>
        <div class="mini-bar"><div class="mini-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="li-right">
        <div class="li-qty" style="${qtyColor}">${scanned}<span style="font-size:10px;color:#6B7280">/${plan||'?'}</span></div>
        <div class="li-status" style="${stColor}">${status}</div>
      </div>
    </li>`;
  }).join('');
}

// ── 유틸 ────────────────────────────────────
function showLoad(msg='처리 중...') {
  document.getElementById('loading-txt').textContent = msg;
  document.getElementById('loading').classList.add('show');
}
function hideLoad() { document.getElementById('loading').classList.remove('show'); }
function vibrate(p) { if (navigator.vibrate) navigator.vibrate(p); }
</script>
</body>
</html>
