<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>STC 적재 스캔</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Segoe UI",Arial,sans-serif;background:#f4f5f7;color:#111827;min-height:100vh;}

/* 시작 화면 */
#start{max-width:400px;margin:0 auto;padding:40px 20px;}
.logo{text-align:center;font-size:48px;margin-bottom:8px;}
.app-title{text-align:center;font-size:20px;font-weight:700;color:#1E2D5A;margin-bottom:4px;}
.app-sub{text-align:center;font-size:12px;color:#6B7280;margin-bottom:32px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;font-weight:600;color:#6B7280;margin-bottom:5px;text-transform:uppercase;}
.field input{width:100%;padding:13px 14px;border:1.5px solid #E2E4E9;border-radius:10px;font-size:15px;background:#fff;}
.field input:focus{outline:none;border-color:#1E2D5A;}
.start-btn{width:100%;padding:15px;border-radius:12px;background:#1E2D5A;color:#fff;font-size:16px;font-weight:700;border:none;cursor:pointer;margin-top:8px;}
.start-btn:disabled{background:#9CA3AF;cursor:not-allowed;}

/* 메인 */
#main{display:none;}
.topbar{background:#1E2D5A;color:#fff;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;}
.tb-left .tb-title{font-size:14px;font-weight:700;}
.tb-left .tb-sub{font-size:10px;color:#93a4c9;margin-top:2px;}
.tb-clock{font-size:16px;font-weight:700;}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:#E2E4E9;}
.kpi-box{background:#fff;padding:10px 6px;text-align:center;}
.kpi-val{font-size:22px;font-weight:700;}
.kpi-lbl{font-size:10px;color:#6B7280;margin-top:1px;}

/* 카메라 */
.cam-wrap{padding:12px 14px;}
.sec-lbl{font-size:10px;font-weight:600;color:#6B7280;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
#qr-reader{width:100%;border-radius:12px;overflow:hidden;border:2px solid #1E2D5A;background:#000;}

/* 결과 카드 */
.result{display:none;margin:10px 14px 0;border-radius:12px;padding:14px;border:2px solid;}
.result.ok   {background:#fff;border-color:#0F6E56;}
.result.err  {background:#FEE2E2;border-color:#FCA5A5;}
.result.dup  {background:#FEF3C7;border-color:#FCD34D;}
.result.over {background:#FEE2E2;border-color:#FCA5A5;}
.r-icon{font-size:22px;margin-bottom:4px;}
.r-name{font-size:15px;font-weight:700;color:#1E2D5A;margin-bottom:3px;}
.r-sub{font-size:11px;color:#6B7280;margin-bottom:8px;}
.r-msg{font-size:13px;font-weight:600;}
.ok-txt{color:#0F6E56;} .err-txt{color:#B91C1C;} .warn-txt{color:#92400E;}

/* 수량 표시 */
.qty-display{background:#1E2D5A;color:#fff;border-radius:8px;padding:10px 14px;margin:8px 0;display:flex;align-items:center;justify-content:space-between;}
.qty-label{font-size:11px;color:#93a4c9;}
.qty-number{font-size:28px;font-weight:700;}
.qty-unit{font-size:12px;color:#93a4c9;}

/* 진행 바 */
.prog-wrap{margin:8px 0;}
.prog-nums{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;}
.prog-bg{height:12px;background:#E5E7EB;border-radius:6px;overflow:hidden;}
.prog-fill{height:100%;border-radius:6px;transition:width .4s;}
.fill-prog{background:#1D4ED8;} .fill-done{background:#0F6E56;}

/* 저장 버튼 */
.save-btn{width:calc(100% - 28px);margin:10px 14px 0;padding:13px;border-radius:10px;background:#0F6E56;color:#fff;font-size:15px;font-weight:700;border:none;cursor:pointer;display:none;}
.save-btn:disabled{background:#9CA3AF;cursor:not-allowed;}
.save-btn:active:not(:disabled){background:#065F46;}

/* 품목 리스트 */
.list-wrap{padding:10px 14px 80px;}
.li{background:#fff;border-radius:10px;border:1px solid #E2E4E9;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px;}
.li.done{border-color:#6EE7B7;background:#F0FDF9;}
.li.prog{border-color:#93C5FD;background:#EFF6FF;}
.li-info{flex:1;min-width:0;}
.li-name{font-size:12px;font-weight:700;color:#1E2D5A;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.li-code{font-size:10px;font-family:monospace;color:#6B7280;}
.li-right{text-align:right;flex-shrink:0;}
.li-qty{font-size:14px;font-weight:700;}
.li-status{font-size:10px;font-weight:600;}
.mini-bar{height:4px;background:#E5E7EB;border-radius:2px;overflow:hidden;margin-top:4px;min-width:60px;}
.mini-fill{height:100%;border-radius:2px;background:#0F6E56;}

/* 로딩 */
.loading{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center;flex-direction:column;gap:10px;}
.loading.show{display:flex;}
.spinner{width:36px;height:36px;border:4px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{color:#fff;font-size:13px;font-weight:600;}
</style>
</head>
<body>

<div id="start">
  <div class="logo">📦</div>
  <div class="app-title">STC 적재 스캔</div>
  <div class="app-sub">수출 적재 QR 확인 시스템</div>
  <div class="field">
    <label>컨테이너 번호 *</label>
    <input id="s-cont" placeholder="예) CN-2026-0627-A" oninput="chkStart()">
  </div>
  <div class="field">
    <label>작업자 이름 *</label>
    <input id="s-worker" placeholder="이름" oninput="chkStart()">
  </div>
  <button class="start-btn" id="start-btn" disabled onclick="goMain()">📷 스캔 시작</button>
</div>

<div id="main">
  <div class="topbar">
    <div class="tb-left">
      <div class="tb-title" id="t-cont">—</div>
      <div class="tb-sub" id="t-worker">작업자: —</div>
    </div>
    <div class="tb-clock" id="clock"></div>
  </div>

  <div class="kpi-row">
    <div class="kpi-box"><div class="kpi-val" style="color:#1E2D5A" id="k-total">0</div><div class="kpi-lbl">계획</div></div>
    <div class="kpi-box"><div class="kpi-val" style="color:#0F6E56" id="k-done">0</div><div class="kpi-lbl">완료</div></div>
    <div class="kpi-box"><div class="kpi-val" style="color:#B91C1C" id="k-miss">0</div><div class="kpi-lbl">미완료</div></div>
  </div>

  <div class="cam-wrap">
    <div class="sec-lbl">📷 QR 스캔</div>
    <div id="qr-reader"></div>
  </div>

  <div class="result" id="result"></div>
  <button class="save-btn" id="save-btn" onclick="doSave()">✅ 저장</button>

  <div class="list-wrap">
    <div class="sec-lbl" style="margin-bottom:8px">품목 현황</div>
    <ul style="list-style:none" id="item-list"></ul>
  </div>
</div>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-txt" id="loading-txt">처리 중...</div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyR0d7Xx84bsyeP3yvFmSy5fMyED_Oey6E0EGmwP7zKOuL81QXx96E4jH__dPuD7HVqGA/exec";

let CFG      = { cont:"", worker:"", date:"" };
let PLAN     = [];
let pending  = null;   // 현재 스캔됐지만 저장 전 대기 중인 항목
let scanned  = new Set(); // 저장 완료된 rawQR 세트
let scanner  = null;
let lastQR   = ""; let lastT = 0;

// ── 시작 ──────────────────────────────
function chkStart() {
  const c = document.getElementById("s-cont").value.trim();
  const w = document.getElementById("s-worker").value.trim();
  document.getElementById("start-btn").disabled = !(c && w);
}

async function goMain() {
  CFG.cont   = document.getElementById("s-cont").value.trim();
  CFG.worker = document.getElementById("s-worker").value.trim();
  CFG.date   = new Date().toISOString().slice(0,10);
  document.getElementById("start").style.display = "none";
  document.getElementById("main").style.display  = "block";
  document.getElementById("t-cont").textContent   = CFG.cont;
  document.getElementById("t-worker").textContent = "작업자: " + CFG.worker;
  startClock();
  await loadPlan();
  initCam();
}

function startClock() {
  const el = document.getElementById("clock");
  const tick = () => el.textContent = new Date().toLocaleTimeString("ko-KR",{hour12:false});
  tick(); setInterval(tick, 1000);
}

// ── 계획 로드 ──────────────────────────
async function loadPlan() {
  showLoad("계획 로딩 중...");
  try {
    const res  = await fetch(SCRIPT_URL+"?action=getPlan&containerNo="+encodeURIComponent(CFG.cont)+"&date="+CFG.date);
    const data = await res.json();
    if (data.status === "ok") {
      PLAN = data.plan.map(p => ({...p, scannedEA:0}));
      await loadScanLog();
    }
  } catch(e) { PLAN = []; }
  hideLoad();
  renderList();
}

async function loadScanLog() {
  try {
    const res  = await fetch(SCRIPT_URL+"?action=getScanLog&containerNo="+encodeURIComponent(CFG.cont)+"&date="+CFG.date);
    const data = await res.json();
    if (data.status === "ok") {
      data.logs.forEach(log => {
        // boxId 복원해서 scanned Set에 추가
        if (log.boxId) scanned.add(log.boxId);
        // PLAN 수량 반영
        const item = PLAN.find(p => p.qrKey === log.qrKey);
        if (item) item.scannedEA += (Number(log.qty) || 0);
      });
    }
  } catch(e) {}
}

// ── 카메라 ────────────────────────────
function initCam() {
  scanner = new Html5Qrcode("qr-reader");
  scanner.start(
    { facingMode:"environment" },
    { fps:12, qrbox:{width:220,height:220} },
    onScan, ()=>{}
  ).catch(() => {
    document.getElementById("qr-reader").innerHTML =
      "<div style=\"padding:24px;text-align:center;color:#fff;font-size:13px\">카메라 접근 불가<br>아래 리스트 터치로 스캔</div>";
  });
}

function onScan(text) {
  const now = Date.now();
  if (text === lastQR && now - lastT < 2500) return;
  lastQR = text; lastT = now;
  processScan(text);
}

// ── 스캔 처리 ─────────────────────────
function processScan(rawQR) {
  // 이전 pending 초기화
  pending = null;

  const card = document.getElementById("result");
  card.style.display = "block";
  document.getElementById("save-btn").style.display = "none";

  // QR 파싱: QR_KEY|수량EA|BOX001 또는 QR_KEY
  const parts = rawQR.split("|");
  const qrKey = parts[0].trim();
  const qty   = parts.length >= 2 ? parseInt(parts[1]) || 1 : 1;
  const boxId = parts.length >= 3 ? parts[2].trim() : null;

  // ① 중복 차단 (이미 저장된 BOX)
  if (boxId && scanned.has(rawQR)) {
    card.className = "result dup";
    card.innerHTML = `
      <div class="r-icon">⚠️</div>
      <div class="r-name">중복 스캔</div>
      <div class="r-sub">${boxId}</div>
      <div class="r-msg warn-txt">이미 저장된 박스입니다</div>`;
    vibrate([100]);
    return;
  }

  // ② 마스터/계획 확인
  const item = PLAN.find(p => p.qrKey === qrKey);
  if (!item && PLAN.length > 0) {
    card.className = "result err";
    card.innerHTML = `
      <div class="r-icon">❌</div>
      <div class="r-name">오적재 감지!</div>
      <div class="r-sub">${qrKey}</div>
      <div class="r-msg err-txt">이 컨테이너 계획에 없는 품목</div>`;
    vibrate([200,100,200]);
    return;
  }

  // ③ 정상 — pending 설정
  const planItem = item || { qrKey, partCode:qrKey, partName:qrKey, customer:"", planQty:null, scannedEA:0 };
  pending = { ...planItem, rawQR, boxId, qty };

  const planEA    = planItem.planQty || 0;
  const nowEA     = planItem.scannedEA || 0;
  const afterEA   = nowEA + qty;
  const pct       = planEA ? Math.min(100, Math.round(afterEA/planEA*100)) : 0;
  const isDone    = planEA && afterEA >= planEA;

  card.className = "result ok";
  card.innerHTML = `
    <div class="r-name">${planItem.partName}</div>
    <div class="r-sub">${planItem.partCode} | ${planItem.customer}${boxId ? " | "+boxId : ""}</div>
    <div class="qty-display">
      <div><div class="qty-label">이번 박스 수량</div><div class="qty-number">${qty.toLocaleString()}</div></div>
      <div style="text-align:right"><div class="qty-label">누적</div><div class="qty-unit">${afterEA.toLocaleString()} / ${planEA ? planEA.toLocaleString() : "?"} EA</div></div>
    </div>
    <div class="prog-wrap">
      <div class="prog-bg"><div class="prog-fill ${isDone?"fill-done":"fill-prog"}" style="width:${pct}%"></div></div>
    </div>
    ${isDone ? "<div class=\"r-msg ok-txt\" style=\"text-align:center;margin-top:8px\">✅ 완료!</div>" :
      "<div class=\"r-msg\" style=\"color:#6B7280;text-align:center;margin-top:4px\">남은: "+(planEA-afterEA).toLocaleString()+" EA</div>"}`;

  document.getElementById("save-btn").style.display = "block";
  document.getElementById("save-btn").disabled      = false;
  vibrate([50]);
}

// ── 저장 ─────────────────────────────
async function doSave() {
  if (!pending) return;
  document.getElementById("save-btn").disabled = true;
  showLoad("저장 중...");

  try {
    const res  = await fetch(SCRIPT_URL, {
      method:"POST",
      body: JSON.stringify({
        action      : "scan",
        qrKey       : pending.qrKey,
        containerNo : CFG.cont,
        qty         : pending.qty,
        scanBy      : CFG.worker,
        boxId       : pending.boxId || "",
      }),
    });
    const data = await res.json();
    hideLoad();

    if (data.status === "ok") {
      // ✅ 저장 성공 후에만 scanned에 추가
      if (pending.rawQR) scanned.add(pending.rawQR);
      // PLAN 수량 업데이트
      const item = PLAN.find(p => p.qrKey === pending.qrKey);
      if (item) item.scannedEA = (item.scannedEA||0) + pending.qty;
      renderList();
      document.getElementById("save-btn").style.display = "none";
      vibrate(data.isDone ? [50,50,100,50,100] : [50]);
      pending = null;
    } else {
      alert("오류: " + data.msg);
      document.getElementById("save-btn").disabled = false;
      pending = null;
    }
  } catch(e) {
    hideLoad();
    // 오프라인
    if (pending.rawQR) scanned.add(pending.rawQR);
    const item = PLAN.find(p => p.qrKey === pending.qrKey);
    if (item) item.scannedEA = (item.scannedEA||0) + pending.qty;
    renderList();
    document.getElementById("save-btn").style.display = "none";
    pending = null;
  }
}

// ── 리스트 렌더 ───────────────────────
function renderList() {
  const total = PLAN.length;
  const done  = PLAN.filter(p => p.planQty && (p.scannedEA||0) >= p.planQty).length;
  document.getElementById("k-total").textContent = total;
  document.getElementById("k-done").textContent  = done;
  document.getElementById("k-miss").textContent  = total - done;

  const ul = document.getElementById("item-list");
  if (!PLAN.length) {
    ul.innerHTML = "<li style=\"text-align:center;color:#6B7280;font-size:12px;padding:20px\">계획 데이터 없음<br>2.PLAN 시트에 데이터를 입력하세요</li>";
    return;
  }
  ul.innerHTML = PLAN.map(p => {
    const plan    = p.planQty || 0;
    const nowEA   = p.scannedEA || 0;
    const isDone  = plan && nowEA >= plan;
    const isIn    = nowEA > 0 && !isDone;
    const pct     = plan ? Math.min(100, Math.round(nowEA/plan*100)) : 0;
    const qc = isDone?"color:#0F6E56":isIn?"color:#1D4ED8":"color:#B91C1C";
    const sc = isDone?"color:#0F6E56":isIn?"color:#1D4ED8":"color:#B91C1C";
    const st = isDone?"✅ 완료":isIn?nowEA.toLocaleString()+"/"+plan.toLocaleString():"미스캔";
    return `
    <li class="li ${isDone?"done":isIn?"prog":""}">
      <div class="li-info">
        <div class="li-name">${p.partName}</div>
        <div class="li-code">${p.partCode}</div>
        <div class="mini-bar"><div class="mini-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="li-right">
        <div class="li-qty" style="${qc}">${nowEA.toLocaleString()}<span style="font-size:10px;color:#6B7280">/${plan?plan.toLocaleString():"?"}</span></div>
        <div class="li-status" style="${sc}">${st}</div>
      </div>
    </li>`;
  }).join("");
}

function showLoad(msg="처리 중...") {
  document.getElementById("loading-txt").textContent = msg;
  document.getElementById("loading").classList.add("show");
}
function hideLoad() { document.getElementById("loading").classList.remove("show"); }
function vibrate(p) { if (navigator.vibrate) navigator.vibrate(p); }
</script>
</body>
</html>
