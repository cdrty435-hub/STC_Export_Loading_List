<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STC QR 스티커 생성</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root {
  --navy:#1E2D5A; --green:#0F6E56; --greenL:#D1FAE5;
  --red:#B91C1C;  --redL:#FEE2E2;
  --gray:#F4F5F7; --border:#E2E4E9;
  --text:#111827; --muted:#6B7280;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--gray);color:var(--text);}

.header{background:var(--navy);color:#fff;padding:13px 24px;}
.h-title{font-size:16px;font-weight:700;}
.h-sub{font-size:11px;color:#93a4c9;margin-top:2px;}

.main{max-width:900px;margin:0 auto;padding:20px 16px;}

/* 입력 패널 */
.input-panel{background:#fff;border-radius:12px;border:1px solid var(--border);padding:20px;margin-bottom:16px;}
.panel-title{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:14px;display:flex;align-items:center;gap:8px;}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.field label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px;}
.field input,.field select{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;background:#fff;}
.field input:focus,.field select:focus{outline:none;border-color:var(--navy);}
.field.full{grid-column:1/-1;}

/* 품목 추가 */
.add-row{display:flex;gap:8px;margin-bottom:10px;}
.add-input{flex:1;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:monospace;}
.add-input:focus{outline:none;border-color:var(--navy);}
.add-btn{padding:10px 16px;border-radius:8px;background:var(--navy);color:#fff;border:none;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;}
.add-btn:hover{background:#131E3E;}

/* 품목 리스트 */
.item-list{list-style:none;margin-bottom:14px;}
.item-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--gray);border-radius:8px;margin-bottom:6px;border:1px solid var(--border);}
.item-qr{font-family:monospace;font-size:12px;color:var(--navy);font-weight:700;flex:1;}
.item-name{font-size:11px;color:var(--muted);margin-top:2px;}
.item-qty-wrap{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.item-qty-label{font-size:11px;color:var(--muted);}
.qty-ctrl{display:flex;align-items:center;gap:4px;}
.qb{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:#fff;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.qty-num{font-size:14px;font-weight:700;color:var(--navy);min-width:32px;text-align:center;}
.item-del{background:var(--redL);color:var(--red);border:none;border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;flex-shrink:0;}

.empty-msg{text-align:center;color:var(--muted);font-size:13px;padding:20px;}

/* 버튼 */
.gen-btn{width:100%;padding:13px;border-radius:10px;background:var(--green);color:#fff;font-size:15px;font-weight:700;border:none;cursor:pointer;}
.gen-btn:disabled{background:var(--muted);cursor:not-allowed;}
.gen-btn:active:not(:disabled){background:#065F46;}

/* 마스터 검색 드롭다운 */
.search-wrap{position:relative;}
.drop{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--border);border-radius:8px;max-height:200px;overflow-y:auto;z-index:50;display:none;box-shadow:0 4px 12px rgba(0,0,0,.1);}
.drop.show{display:block;}
.drop-item{padding:9px 12px;cursor:pointer;border-bottom:1px solid #F3F4F6;font-size:12px;}
.drop-item:hover{background:var(--gray);}
.drop-item:last-child{border-bottom:none;}
.drop-code{font-family:monospace;font-size:11px;color:var(--muted);}

/* 미리보기 */
.preview-panel{background:#fff;border-radius:12px;border:1px solid var(--border);padding:20px;display:none;}
.preview-title{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:14px;}

/* 스티커 그리드 */
.sticker-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;}

.sticker{
  border:1.5px solid #CBD5E1;border-radius:8px;padding:0;
  overflow:hidden;background:#fff;
  page-break-inside:avoid;
}
.sticker-hdr{
  background:var(--navy);color:#fff;
  padding:5px 8px;display:flex;justify-content:space-between;align-items:center;
}
.sticker-hdr-cust{font-size:10px;font-weight:700;}
.sticker-hdr-no{font-size:9px;color:#93a4c9;}
.sticker-body{padding:8px;text-align:center;}
.sticker-qr{display:flex;justify-content:center;margin-bottom:6px;}
.sticker-name{font-size:10px;font-weight:700;color:var(--navy);margin-bottom:3px;line-height:1.3;}
.sticker-code{font-family:monospace;font-size:9px;color:var(--green);font-weight:700;margin-bottom:2px;}
.sticker-key{font-family:monospace;font-size:7px;color:var(--muted);}
.sticker-footer{font-size:8px;color:var(--muted);padding:4px 8px;border-top:1px solid #F3F4F6;display:flex;justify-content:space-between;}

.print-btn{width:100%;padding:12px;border-radius:10px;background:var(--navy);color:#fff;font-size:14px;font-weight:700;border:none;cursor:pointer;}
.print-btn:hover{background:#131E3E;}

/* 프린트 */
@media print {
  body{background:#fff;}
  .header,.input-panel,.main > .input-panel{display:none !important;}
  .preview-panel{display:block !important;border:none;padding:0;}
  .preview-title,.print-btn{display:none !important;}
  .sticker-grid{gap:4mm;grid-template-columns:repeat(3,1fr);}
  .sticker{border:1px solid #CBD5E1;border-radius:4px;}
  @page{size:A4;margin:10mm;}
}
</style>
</head>
<body>

<div class="header">
  <div class="h-title">🏷️ STC QR 스티커 생성</div>
  <div class="h-sub">QR_KEY와 수량을 입력하면 인쇄용 스티커를 만들어드립니다</div>
</div>

<div class="main">

  <!-- 입력 패널 -->
  <div class="input-panel">
    <div class="panel-title">📦 품목 입력</div>

    <!-- 기본 정보 -->
    <div class="form-grid">
      <div class="field">
        <label>회사명</label>
        <input id="company" value="STC Co., Ltd." placeholder="STC Co., Ltd.">
      </div>
      <div class="field">
        <label>컨테이너 번호 (선택)</label>
        <input id="container" placeholder="예) CN-2026-0627-A">
      </div>
    </div>

    <!-- 품목 추가 -->
    <div class="field" style="margin-bottom:10px">
      <label>QR_KEY 또는 PART_CODE 검색/입력</label>
      <div class="search-wrap">
        <div class="add-row">
          <input class="add-input" id="qr-input"
            placeholder="예) SHINANN_F543QVAQA03  또는  F543QVAQA03"
            oninput="searchMaster()" onkeydown="if(event.key==='Enter') addItem()">
          <button class="add-btn" onclick="addItem()">＋ 추가</button>
        </div>
        <div class="drop" id="master-drop"></div>
      </div>
    </div>

    <!-- 품목 리스트 -->
    <ul class="item-list" id="item-list">
      <li class="empty-msg">위에서 QR_KEY를 입력하거나 검색해서 추가하세요</li>
    </ul>

    <button class="gen-btn" id="gen-btn" disabled onclick="generate()">
      🏷️ QR 스티커 생성
    </button>
  </div>

  <!-- 미리보기 -->
  <div class="preview-panel" id="preview-panel">
    <div class="preview-title">🖨️ 스티커 미리보기 — 총 <span id="total-count">0</span>장</div>
    <div class="sticker-grid" id="sticker-grid"></div>
    <button class="print-btn" onclick="window.print()">🖨️ 인쇄</button>
  </div>

</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyR0d7Xx84bsyeP3yvFmSy5fMyED_Oey6E0EGmwP7zKOuL81QXx96E4jH__dPuD7HVqGA/exec";

let MASTER  = [];
let items   = []; // [{ qrKey, partCode, partName, customer, qty }]
let qrCache = {}; // qrKey → dataURL

// ── 마스터 로드 ───────────────────────────────
window.onload = async () => {
  try {
    const res  = await fetch(`${SCRIPT_URL}?action=getMaster`);
    const data = await res.json();
    if (data.status === 'ok') MASTER = data.items;
  } catch(e) {
    MASTER = [];
  }

  // 외부 클릭 시 드롭다운 닫기
  document.addEventListener('click', e => {
    if (!e.target.closest('.search-wrap'))
      document.getElementById('master-drop').classList.remove('show');
  });
};

// ── 마스터 검색 ──────────────────────────────
function searchMaster() {
  const q    = document.getElementById('qr-input').value.trim().toLowerCase();
  const drop = document.getElementById('master-drop');
  if (!q) { drop.classList.remove('show'); return; }

  const results = MASTER.filter(m =>
    m.qrKey.toLowerCase().includes(q) ||
    m.partCode.toLowerCase().includes(q) ||
    m.partName.toLowerCase().includes(q)
  ).slice(0, 15);

  if (!results.length) { drop.classList.remove('show'); return; }

  drop.innerHTML = results.map(m => `
    <div class="drop-item" onclick="selectMaster('${m.qrKey}')">
      <div style="font-weight:600">${m.partName}</div>
      <div class="drop-code">${m.partCode} &nbsp;|&nbsp; ${m.customer}</div>
    </div>`).join('');
  drop.classList.add('show');
}

function selectMaster(qrKey) {
  document.getElementById('qr-input').value = qrKey;
  document.getElementById('master-drop').classList.remove('show');
  addItem();
}

// ── 품목 추가 ────────────────────────────────
function addItem() {
  const val = document.getElementById('qr-input').value.trim();
  if (!val) return;

  // 이미 추가된 품목
  if (items.find(i => i.qrKey === val)) {
    alert('이미 추가된 품목입니다.');
    return;
  }

  // 마스터에서 찾기
  const found = MASTER.find(m => m.qrKey === val || m.partCode === val);

  if (found) {
    items.push({ qrKey: found.qrKey, partCode: found.partCode, partName: found.partName, customer: found.customer, qty: 1 });
  } else {
    // 마스터에 없어도 직접 추가 허용
    items.push({ qrKey: val, partCode: val, partName: val, customer: '', qty: 1 });
  }

  document.getElementById('qr-input').value = '';
  document.getElementById('master-drop').classList.remove('show');
  renderList();
}

// ── 수량 변경 ────────────────────────────────
function chgQty(idx, d) {
  items[idx].qty = Math.max(1, Math.min(999, items[idx].qty + d));
  renderList();
}

// ── 삭제 ────────────────────────────────────
function delItem(idx) {
  items.splice(idx, 1);
  renderList();
}

// ── 리스트 렌더 ──────────────────────────────
function renderList() {
  const ul = document.getElementById('item-list');
  if (!items.length) {
    ul.innerHTML = '<li class="empty-msg">위에서 QR_KEY를 입력하거나 검색해서 추가하세요</li>';
    document.getElementById('gen-btn').disabled = true;
    return;
  }

  ul.innerHTML = items.map((item, i) => `
    <li class="item-row">
      <div style="flex:1;min-width:0">
        <div class="item-qr">${item.qrKey}</div>
        <div class="item-name">${item.partName !== item.qrKey ? item.partName : ''}${item.customer ? ' | ' + item.customer : ''}</div>
      </div>
      <div class="item-qty-wrap">
        <span class="item-qty-label">수량</span>
        <div class="qty-ctrl">
          <button class="qb" onclick="chgQty(${i},-1)">−</button>
          <span class="qty-num">${item.qty}</span>
          <button class="qb" onclick="chgQty(${i},1)">＋</button>
        </div>
        <span style="font-size:11px;color:var(--muted)">장</span>
      </div>
      <button class="item-del" onclick="delItem(${i})">✕</button>
    </li>`).join('');

  document.getElementById('gen-btn').disabled = false;
}

// ── QR 코드 생성 (dataURL) ───────────────────
function makeQR(text) {
  return new Promise(resolve => {
    const div = document.createElement('div');
    div.style.display = 'none';
    document.body.appendChild(div);
    const qr = new QRCode(div, {
      text,
      width : 128,
      height: 128,
      correctLevel: QRCode.CorrectLevel.M,
    });
    setTimeout(() => {
      const img = div.querySelector('img') || div.querySelector('canvas');
      const url = img ? (img.src || img.toDataURL()) : '';
      document.body.removeChild(div);
      resolve(url);
    }, 200);
  });
}

// ── 스티커 생성 ──────────────────────────────
async function generate() {
  if (!items.length) return;
  document.getElementById('gen-btn').disabled = true;
  document.getElementById('gen-btn').textContent = '생성 중...';

  const company   = document.getElementById('company').value.trim() || 'STC Co., Ltd.';
  const container = document.getElementById('container').value.trim();
  const grid      = document.getElementById('sticker-grid');
  grid.innerHTML  = '';

  let totalCount = 0;
  const stickers = [];

  // 전체 스티커 목록 생성
  for (const item of items) {
    for (let n = 1; n <= item.qty; n++) {
      stickers.push({ ...item, no: n, total: item.qty });
    }
    totalCount += item.qty;
  }

  document.getElementById('total-count').textContent = totalCount;

  // QR 이미지 미리 생성
  const uniqueKeys = [...new Set(stickers.map(s => s.qrKey))];
  for (const key of uniqueKeys) {
    if (!qrCache[key]) {
      qrCache[key] = await makeQR(key);
    }
  }

  // 스티커 렌더
  stickers.forEach((s, idx) => {
    const isShin  = (s.customer || '').toUpperCase().includes('SHINANN');
    const hdrBg   = isShin ? '#1D4ED8' : s.customer ? '#92400E' : '#1E2D5A';
    const nameShort = s.partName.length > 24 ? s.partName.slice(0,22)+'...' : s.partName;
    const keyShort  = s.qrKey.length > 28 ? s.qrKey.slice(0,26)+'...' : s.qrKey;

    const div = document.createElement('div');
    div.className = 'sticker';
    div.innerHTML = `
      <div class="sticker-hdr" style="background:${hdrBg}">
        <span class="sticker-hdr-cust">${s.customer || 'STC'}</span>
        <span class="sticker-hdr-no">#${String(idx+1).padStart(3,'0')} &nbsp; ${s.no}/${s.total}</span>
      </div>
      <div class="sticker-body">
        <div class="sticker-qr">
          <img src="${qrCache[s.qrKey]}" width="90" height="90" style="image-rendering:pixelated">
        </div>
        <div class="sticker-name">${nameShort}</div>
        <div class="sticker-code">${s.partCode}</div>
        <div class="sticker-key">${keyShort}</div>
      </div>
      <div class="sticker-footer">
        <span>${company}</span>
        <span>${container || new Date().toLocaleDateString('ko-KR')}</span>
      </div>`;
    grid.appendChild(div);
  });

  document.getElementById('preview-panel').style.display = 'block';
  document.getElementById('preview-panel').scrollIntoView({ behavior: 'smooth' });
  document.getElementById('gen-btn').disabled = false;
  document.getElementById('gen-btn').textContent = '🏷️ QR 스티커 생성';
}
</script>
</body>
</html>
