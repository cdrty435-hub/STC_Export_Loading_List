<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STC 수출 적재 대시보드</title>
<style>
:root{
  --navy:#0F1B3C; --navy2:#1E2D5A;
  --bg:#F4F6FB; --card:#FFFFFF;
  --line:#E6E9F2; --muted:#8A93A6; --text:#1A2236;
  --wait:#C7CCDA; --waitBg:#F1F2F6;
  --prog:#F59E0B; --progBg:#FEF3C7;
  --done:#16A34A; --doneBg:#DCFCE7;
  --ship:#7C3AED; --shipBg:#EDE6FB;
  --red:#DC2626;
  --radius:16px;
  --shadow:0 1px 2px rgba(16,24,52,.04), 0 8px 24px -12px rgba(16,24,52,.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Pretendard','Segoe UI','Apple SD Gothic Neo',sans-serif;
  background:
    radial-gradient(1200px 480px at 100% -10%, #1E2D5A22, transparent),
    var(--bg);
  color:var(--text); min-height:100vh; padding-bottom:60px;
}

/* ── Header ───────────────────────────── */
.header{
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 100%);
  color:#fff; padding:28px;
  position:relative; overflow:hidden;
}
.header::after{
  content:''; position:absolute; right:-60px; top:-60px; width:280px; height:280px;
  border-radius:50%; background:radial-gradient(circle,#ffffff14,transparent 70%);
}
.header-top{display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:16px;}
.htitle{font-size:22px; font-weight:800; letter-spacing:-.3px;}
.hsub{font-size:13px; color:#B9C2E0; margin-top:4px;}
.hfilters{display:flex; gap:8px; flex-wrap:wrap;}
.hfilters select, .hfilters input{
  background:#ffffff14; border:1px solid #ffffff30; color:#fff;
  border-radius:10px; padding:8px 12px; font-size:12.5px; outline:none;
}
.hfilters select option{color:#111;}
.hfilters input::placeholder{color:#C8D0EA;}
.refresh-btn{
  background:#fff; color:var(--navy); border:none; border-radius:10px;
  padding:8px 14px; font-size:12.5px; font-weight:700; cursor:pointer;
}

/* ── Overall ring summary ───────────────── */
.summary{
  display:flex; gap:22px; flex-wrap:wrap; align-items:center;
  margin-top:26px;
}
.ring-wrap{
  background:#ffffff10; border:1px solid #ffffff22; border-radius:18px;
  padding:18px 22px; display:flex; align-items:center; gap:16px;
}
.ring-wrap svg{display:block;}
.ring-label{font-size:12px; color:#C8D0EA;}
.ring-val{font-size:26px; font-weight:800;}
.stage-counts{display:flex; gap:14px; flex-wrap:wrap;}
.scount{
  background:#ffffff10; border:1px solid #ffffff22; border-radius:14px;
  padding:12px 18px; min-width:96px;
}
.scount .n{font-size:22px; font-weight:800;}
.scount .l{font-size:11px; color:#C8D0EA; margin-top:2px;}

.cust-panel{
  flex:1; min-width:220px; display:flex; flex-direction:column; gap:9px;
  background:#ffffff0a; border:1px solid #ffffff1c; border-radius:14px;
  padding:14px 18px;
}
.cust-panel-title{font-size:11px; color:#C8D0EA; margin-bottom:2px; font-weight:700; letter-spacing:.3px;}
.cust-row{display:flex; align-items:center; gap:10px;}
.cust-row .nm{
  font-size:11px; font-weight:800; color:#fff; min-width:64px;
  padding:2px 8px; border-radius:6px; text-align:center;
}
.cust-row .bar-bg{flex:1; height:7px; border-radius:5px; background:#ffffff1c; overflow:hidden;}
.cust-row .bar-fg{height:100%; border-radius:5px; transition:width .5s ease;}
.cust-row .pct{font-size:11.5px; font-weight:800; color:#fff; min-width:38px; text-align:right;}
.cust-row .qty{font-size:10px; color:#9AA4C4; min-width:80px; text-align:right;}

/* ── Pipeline legend ─────────────────────── */
.legend{
  display:flex; gap:18px; flex-wrap:wrap; font-size:12px; color:#C8D0EA;
  margin-top:18px;
}
.legend span{display:inline-flex; align-items:center; gap:6px;}
.dot{width:9px; height:9px; border-radius:50%; display:inline-block;}

/* ── Grid ─────────────────────────────────── */
.grid{
  display:grid; grid-template-columns:repeat(auto-fill,minmax(330px,1fr));
  gap:16px; padding:24px 28px;
}
.empty{
  grid-column:1/-1; text-align:center; color:var(--muted); padding:60px 20px; font-size:14px;
}

/* ── Item card ────────────────────────────── */
.card{
  background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
  box-shadow:var(--shadow); padding:18px 20px; position:relative;
}
.card-top{display:flex; justify-content:space-between; align-items:flex-start; gap:8px; margin-bottom:14px;}
.cust-badge{
  font-size:10.5px; font-weight:800; letter-spacing:.3px;
  padding:3px 9px; border-radius:7px; display:inline-block; color:#fff;
}
.cust-shin{background:#1D4ED8;}      /* SHINANN — QR 스티커와 동일 */
.cust-other{background:#92400E;}     /* 그 외 고객사 — QR 스티커와 동일 */
.cust-none{background:var(--navy2);}
.part-name{font-size:14.5px; font-weight:700; margin-top:7px; line-height:1.3;}
.part-code{font-size:11.5px; color:var(--muted); margin-top:2px;}
.plan-qty{font-size:11px; color:var(--muted); text-align:right; white-space:nowrap;}
.plan-qty b{color:var(--text); font-size:13px;}

/* ── 3-stage pipeline ─────────────────────── */
.pipeline{display:grid; grid-template-columns:78px 1fr 78px 1fr 78px; align-items:start; margin:14px 0 6px;}
.stage{display:flex; flex-direction:column; align-items:center; gap:6px;}
.stage-label{font-size:11px; font-weight:700; color:var(--muted);}
.stage-sub{font-size:9.5px; color:var(--muted);}
.stage-status{
  font-size:9.5px; font-weight:800; padding:1.5px 7px; border-radius:6px; margin-top:1px;
}
.st-대기{color:#9097AB; background:var(--waitBg);}
.st-진행중{color:#B45309; background:var(--progBg);}
.st-완료{color:#15803D; background:var(--doneBg);}
.connector{height:2px; background:var(--line); margin-top:21px;}
.connector.on{background:var(--done);}

/* ── Final result + ship button ───────────── */
.card-foot{
  display:flex; justify-content:space-between; align-items:center;
  margin-top:14px; padding-top:12px; border-top:1px solid var(--line);
}
.result-txt{font-size:12px; font-weight:700;}
.ship-btn{
  background:var(--ship); color:#fff; border:none; border-radius:9px;
  padding:7px 14px; font-size:11.5px; font-weight:700; cursor:pointer;
}
.ship-btn:disabled{background:var(--wait); cursor:default;}
.shipped-tag{
  font-size:11px; font-weight:800; color:var(--ship); background:var(--shipBg);
  padding:5px 12px; border-radius:8px;
}

.loading{ text-align:center; padding:80px 20px; color:var(--muted); font-size:14px; }
@keyframes spin{to{transform:rotate(360deg);}}
.spinner{
  width:28px; height:28px; border:3px solid var(--line); border-top-color:var(--navy2);
  border-radius:50%; margin:0 auto 12px; animation:spin .8s linear infinite;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="htitle">📦 STC 수출 적재 대시보드</div>
      <div class="hsub">BOX 포장 → PALLET 적재 → 출하 · 실시간 진행 현황</div>
    </div>
    <div class="hfilters">
      <input type="date" id="f-date">
      <input type="text" id="f-cont" placeholder="컨테이너 번호 (전체는 비워두기)">
      <button class="refresh-btn" onclick="loadDashboard()">🔄 새로고침</button>
    </div>
  </div>

  <div class="summary">
    <div class="ring-wrap">
      <svg width="86" height="86" viewBox="0 0 86 86">
        <circle cx="43" cy="43" r="36" fill="none" stroke="#ffffff22" stroke-width="9"/>
        <circle id="ring-fg" cx="43" cy="43" r="36" fill="none" stroke="#fff" stroke-width="9"
          stroke-linecap="round" stroke-dasharray="226" stroke-dashoffset="226"
          transform="rotate(-90 43 43)" style="transition:stroke-dashoffset .6s ease"/>
        <text id="ring-pct" x="43" y="48" text-anchor="middle" font-size="17" font-weight="800" fill="#fff">0%</text>
      </svg>
      <div>
        <div class="ring-label">전체 출하 완료율</div>
        <div class="ring-val" id="ring-frac">0 / 0</div>
      </div>
    </div>
    <div class="stage-counts">
      <div class="scount"><div class="n" id="cnt-wait">0</div><div class="l">⏳ 대기</div></div>
      <div class="scount"><div class="n" id="cnt-prog">0</div><div class="l">🔄 진행중</div></div>
      <div class="scount"><div class="n" id="cnt-pallet">0</div><div class="l">🏗️ 팔레트완료</div></div>
      <div class="scount"><div class="n" id="cnt-ship">0</div><div class="l">🚛 출하완료</div></div>
    </div>
    <div class="cust-panel" id="cust-panel"></div>
  </div>

  <div class="legend">
    <span><span class="dot" style="background:var(--wait)"></span>대기</span>
    <span><span class="dot" style="background:var(--prog)"></span>진행중</span>
    <span><span class="dot" style="background:var(--done)"></span>완료</span>
  </div>
</div>

<div class="grid" id="grid">
  <div class="loading"><div class="spinner"></div>품목 데이터를 불러오는 중...</div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbyR0d7Xx84bsyeP3yvFmSy5fMyED_Oey6E0EGmwP7zKOuL81QXx96E4jH__dPuD7HVqGA/exec";

function localDateStr(d){
  d = d || new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

let ITEMS = [];

window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('f-date').value = localDateStr();
  loadDashboard();
  setInterval(loadDashboard, 30000); // 30초마다 자동 새로고침
});

async function loadDashboard() {
  const date = document.getElementById('f-date').value;
  const cont = document.getElementById('f-cont').value.trim();
  try {
    const res = await fetch(`${URL}?action=getDashboard&date=${encodeURIComponent(date)}&containerNo=${encodeURIComponent(cont)}`);
    const data = await res.json();
    if (data.status === "ok") {
      ITEMS = data.items || [];
      render();
    } else {
      document.getElementById('grid').innerHTML = `<div class="empty">⚠ 데이터를 불러오지 못했습니다: ${data.msg||''}</div>`;
    }
  } catch(e) {
    document.getElementById('grid').innerHTML = `<div class="empty">⚠ 서버 연결 실패<br><span style="font-size:11px">${String(e).slice(0,100)}</span></div>`;
  }
}

function render() {
  // 상단 요약
  const total   = ITEMS.length;
  const shipped = ITEMS.filter(i => i.shipStage === "완료").length;
  const pct     = total ? Math.round(shipped/total*100) : 0;
  const circ    = 226;
  document.getElementById('ring-fg').style.strokeDashoffset = circ - (circ*pct/100);
  document.getElementById('ring-pct').textContent = pct + "%";
  document.getElementById('ring-frac').textContent = `${shipped} / ${total}`;

  document.getElementById('cnt-wait').textContent   = ITEMS.filter(i=>i.boxStage==="대기").length;
  document.getElementById('cnt-prog').textContent   = ITEMS.filter(i=>i.boxStage==="진행중"||i.pltStage==="진행중").length;
  document.getElementById('cnt-pallet').textContent = ITEMS.filter(i=>i.pltStage==="완료").length;
  document.getElementById('cnt-ship').textContent   = shipped;

  renderCustPanel();

  // 카드 렌더
  const grid = document.getElementById('grid');
  if (!ITEMS.length) {
    grid.innerHTML = `<div class="empty">해당 날짜/컨테이너에 계획된 품목이 없습니다.</div>`;
    return;
  }
  grid.innerHTML = ITEMS.map(cardHTML).join('');
}

function miniRing(qty, plan, color) {
  const pct  = plan ? Math.min(100, Math.round(qty/plan*100)) : 0;
  const r = 17, circ = 2*Math.PI*r;
  const off = circ - (circ*pct/100);
  return `
    <svg width="42" height="42" viewBox="0 0 42 42">
      <circle cx="21" cy="21" r="${r}" fill="none" stroke="var(--waitBg)" stroke-width="4.5"/>
      <circle cx="21" cy="21" r="${r}" fill="none" stroke="${color}" stroke-width="4.5"
        stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${off}"
        transform="rotate(-90 21 21)"/>
      <text x="21" y="25" text-anchor="middle" font-size="10" font-weight="800" fill="var(--text)">${pct}%</text>
    </svg>`;
}

function stageColor(stage) {
  return stage==="완료" ? "var(--done)" : (stage==="진행중" ? "var(--prog)" : "var(--wait)");
}

function custBadgeClass(customer) {
  if (!customer) return 'cust-none';
  return customer.includes('SHINANN') ? 'cust-shin' : 'cust-other';
}
function custColor(customer) {
  if (!customer) return 'var(--navy2)';
  return customer.includes('SHINANN') ? '#1D4ED8' : '#92400E';
}

function renderCustPanel() {
  const panel = document.getElementById('cust-panel');
  if (!ITEMS.length) { panel.innerHTML = ''; return; }

  const byCust = {};
  ITEMS.forEach(it => {
    const k = it.customer || '(미지정)';
    if (!byCust[k]) byCust[k] = { plan:0, done:0 };
    byCust[k].plan += it.planQty;
    if (it.shipStage === '완료') byCust[k].done += it.planQty;
  });

  const rows = Object.keys(byCust).sort().map(name => {
    const { plan, done } = byCust[name];
    const pct = plan ? Math.round(done/plan*100) : 0;
    const color = custColor(name);
    return `
      <div class="cust-row">
        <span class="nm" style="background:${color}">${name}</span>
        <div class="bar-bg"><div class="bar-fg" style="width:${pct}%;background:${color}"></div></div>
        <span class="pct">${pct}%</span>
        <span class="qty">${done.toLocaleString()}/${plan.toLocaleString()}EA</span>
      </div>`;
  }).join('');

  panel.innerHTML = `<div class="cust-panel-title">고객사별 출하 완료율</div>${rows}`;
}

function cardHTML(it) {
  const boxColor = stageColor(it.boxStage);
  const pltColor = stageColor(it.pltStage);
  const shipDone = it.shipStage === "완료";

  let resultTxt, resultColor;
  if (shipDone)                 { resultTxt = "🚛 출하완료";        resultColor = "var(--ship)"; }
  else if (it.pltStage==="완료"){ resultTxt = "✅ 최종합격 (출하대기)"; resultColor = "var(--done)"; }
  else if (it.boxStage==="완료"){ resultTxt = "🏗️ 팔레트 적재 중";   resultColor = "var(--prog)"; }
  else if (it.boxStage==="진행중"){ resultTxt = "📦 박스 포장 중";    resultColor = "var(--prog)"; }
  else                           { resultTxt = "⏳ 시작 전";          resultColor = "var(--muted)"; }

  return `
  <div class="card">
    <div class="card-top">
      <div>
        <span class="cust-badge ${custBadgeClass(it.customer)}">${it.customer||'-'}</span>
        <div class="part-name">${it.partName}</div>
        <div class="part-code">${it.partCode} · ${it.containerNo}</div>
      </div>
      <div class="plan-qty">계획수량<br><b>${it.planQty.toLocaleString()}</b> EA</div>
    </div>

    <div class="pipeline">
      <div class="stage">
        ${miniRing(it.boxQty, it.planQty, boxColor)}
        <div class="stage-label">📦 BOX</div>
        <div class="stage-sub">${it.boxQty.toLocaleString()}/${it.planQty.toLocaleString()}</div>
        <div class="stage-status st-${it.boxStage}">${it.boxStage}</div>
      </div>
      <div class="connector ${it.boxStage==='완료'?'on':''}"></div>
      <div class="stage">
        ${miniRing(it.palletQty, it.planQty, pltColor)}
        <div class="stage-label">🏗️ PALLET</div>
        <div class="stage-sub">${it.palletQty.toLocaleString()}/${it.planQty.toLocaleString()}</div>
        <div class="stage-status st-${it.pltStage}">${it.pltStage}</div>
      </div>
      <div class="connector ${it.pltStage==='완료'?'on':''}"></div>
      <div class="stage">
        <svg width="42" height="42" viewBox="0 0 42 42">
          <circle cx="21" cy="21" r="17" fill="none" stroke="var(--waitBg)" stroke-width="4.5"/>
          <circle cx="21" cy="21" r="17" fill="none" stroke="${shipDone?'var(--ship)':'var(--waitBg)'}" stroke-width="4.5"
            stroke-dasharray="${2*Math.PI*17}" stroke-dashoffset="${shipDone?0:2*Math.PI*17}"/>
          <text x="21" y="26" text-anchor="middle" font-size="15">${shipDone?'🚛':'·'}</text>
        </svg>
        <div class="stage-label">🚛 출하</div>
        <div class="stage-sub">컨테이너 적재</div>
        <div class="stage-status st-${shipDone?'완료':'대기'}">${shipDone?'완료':'대기'}</div>
      </div>
    </div>

    <div class="card-foot">
      <div class="result-txt" style="color:${resultColor}">${resultTxt}</div>
      ${shipDone
        ? `<span class="shipped-tag">🚛 출하 확정됨</span>`
        : `<button class="ship-btn" ${it.pltStage!=='완료'?'disabled':''} onclick="confirmShip('${it.qrKey}','${it.containerNo}','${it.date}',this)">🚛 출하 확정</button>`
      }
    </div>
  </div>`;
}

async function confirmShip(qrKey, containerNo, date, btn) {
  const by = prompt("출하 확정자 이름을 입력하세요:");
  if (!by) return;
  btn.disabled = true; btn.textContent = "저장 중...";
  try {
    const res = await fetch(URL, {
      method: "POST",
      body: JSON.stringify({ action:"markShipped", qrKey, containerNo, date, shippedBy: by }),
    });
    const data = await res.json();
    if (data.status === "ok") {
      await loadDashboard();
    } else {
      alert("저장 실패: " + (data.msg||"알 수 없는 오류"));
      btn.disabled = false; btn.textContent = "🚛 출하 확정";
    }
  } catch(e) {
    alert("통신 오류: " + e);
    btn.disabled = false; btn.textContent = "🚛 출하 확정";
  }
}
</script>
</body>
</html>
